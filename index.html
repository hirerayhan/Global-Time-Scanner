<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --cyan: #0ff;
            --pink: #f0f;
            --green: #0f0;
            --dark-panel: rgba(0, 20, 30, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 255, 0.03) 2px, rgba(0, 255, 255, 0.03) 4px);
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 30px;
            width: 100%;
        }

        .title-container {
            display: inline-block;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
            overflow: hidden;
            white-space: nowrap;
            border-right: .15em solid var(--pink);
            margin: 0 auto;
            animation: typing 2.5s steps(30, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: var(--pink); }
        }

        .subtitle {
            color: var(--green);
            font-size: 1.1rem;
            opacity: 0.8;
            margin-top: 10px;
            text-shadow: 0 0 5px var(--green);
        }

        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
        }

        .search-input {
            flex: 1;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid var(--cyan);
            padding: 15px 20px;
            font-size: 1.2rem;
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.1), 0 0 10px rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.2), 0 0 20px rgba(0, 255, 255, 0.4);
            border-color: #fff;
        }

        .search-input::placeholder {
            color: rgba(0, 255, 255, 0.3);
        }

        .search-btn {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 0 30px;
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .search-btn:hover {
            background: var(--cyan);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--cyan);
        }

        .loader {
            display: none;
            color: var(--pink);
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--pink);
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .result-wrapper {
            display: none;
            width: 90%;
            max-width: 600px;
            position: relative;
            padding: 3px;
            background: linear-gradient(45deg, var(--cyan), var(--pink), var(--green), var(--cyan));
            background-size: 300% 300%;
            animation: gradientBorder 4s ease infinite;
            border-radius: 5px;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-card {
            background: var(--dark-panel);
            backdrop-filter: blur(5px);
            padding: 30px;
            width: 100%;
            height: 100%;
            text-align: center;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            position: absolute;
            top: -100px;
            left: 0;
            animation: scanline 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        .country-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .timezone-name {
            color: var(--cyan);
            font-size: 1rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .time-display {
            font-size: 4rem;
            color: #fff;
            text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .date-display {
            font-size: 1.5rem;
            color: var(--green);
            text-shadow: 0 0 10px var(--green);
            margin-bottom: 20px;
        }

        .sub-zones {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sub-zone-item {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-left: 2px solid var(--cyan);
            font-size: 1rem;
        }
        
        .sub-zone-name { color: var(--pink); }
        .sub-zone-time { color: #fff; text-shadow: 0 0 5px var(--cyan); }

        /* Added custom scrollbar for large lists of cities */
        .sub-zones {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .sub-zones::-webkit-scrollbar {
            width: 6px;
        }
        
        .sub-zones::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }
        
        .sub-zones::-webkit-scrollbar-thumb {
            background: var(--cyan);
            border-radius: 3px;
            box-shadow: 0 0 5px var(--cyan);
        }

        .error-message {
            display: none;
            color: red;
            text-shadow: 0 0 10px red;
            font-size: 1.5rem;
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: var(--cyan);
            opacity: 0.5;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .search-container { flex-direction: column; }
            .search-btn { padding: 15px; }
            .time-display { font-size: 2.8rem; }
            .country-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <h1>GLOBAL TIME SCANNER</h1>
        </div>
        <div class="subtitle">Search any country to view live time</div>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="e.g., Japan, USA, France..." autocomplete="off" autofocus>
        <button id="searchBtn" class="search-btn">Scan</button>
    </div>

    <div id="loader" class="loader">ESTABLISHING CONNECTION... [ |||||||||| ]</div>
    <div id="errorMessage" class="error-message">ERROR: TERRITORY NOT FOUND IN DATABASE</div>

    <div id="resultWrapper" class="result-wrapper">
        <div class="result-card">
            <div class="scanline"></div>
            <div id="countryName" class="country-name">Japan</div>
            <div id="primaryTimezone" class="timezone-name">JST (Asia/Tokyo)</div>
            <div id="primaryTime" class="time-display">00:00:00 AM</div>
            <div id="primaryDate" class="date-display">Jan 01, 2099</div>
            
            <!-- Container for countries with multiple timezones -->
            <div id="subZonesContainer" class="sub-zones" style="display: none;">
                <!-- Populated via JS -->
            </div>
        </div>
    </div>

    <footer>CYBER TIME SYSTEM v1.0</footer>

    <script>
        // Comprehensive mapping of country names/codes to IANA Timezones
        const countryTimezones = {

            "austria": ["Europe/Vienna"], "azerbaijan": ["Asia/Baku"], "bahamas": ["America/Nassau"], "bahrain": ["Asia/Bahrain"],
            "bangladesh": ["Asia/Dhaka"], "barbados": ["America/Barbados"], "belarus": ["Europe/Minsk"], "belgium": ["Europe/Brussels"],
            "belize": ["America/Belize"], "benin": ["Africa/Porto-Novo"], "bhutan": ["Asia/Thimphu"], "bolivia": ["America/La_Paz"],
            "bosnia and herzegovina": ["Europe/Sarajevo"], "bosnia": ["Europe/Sarajevo"], "botswana": ["Africa/Gaborone"],
            "brazil": ["America/Sao_Paulo", "America/Manaus", "America/Rio_Branco", "America/Noronha", "America/Belem", "America/Fortaleza", "America/Cuiaba", "America/Boa_Vista"], "brunei": ["Asia/Brunei"], "bulgaria": ["Europe/Sofia"],
            "burkina faso": ["Africa/Ouagadougou"], "burundi": ["Africa/Bujumbura"], "cambodia": ["Asia/Phnom_Penh"],
            "cameroon": ["Africa/Douala"], "canada": ["America/Toronto", "America/Winnipeg", "America/Edmonton", "America/Vancouver", "America/Halifax", "America/St_Johns", "America/Regina", "America/Whitehorse", "America/Dawson_Creek"],
            "cape verde": ["Atlantic/Cape_Verde"], "central african republic": ["Africa/Bangui"], "chad": ["Africa/Ndjamena"],
            "chile": ["America/Santiago", "Pacific/Easter"], "china": ["Asia/Shanghai"], "colombia": ["America/Bogota"],

            "cuba": ["America/Havana"], "cyprus": ["Asia/Nicosia"], "czech republic": ["Europe/Prague"], "denmark": ["Europe/Copenhagen"],
            "djibouti": ["Africa/Djibouti"], "dominica": ["America/Dominica"], "dominican republic": ["America/Santo_Domingo"],
            "ecuador": ["America/Guayaquil", "Pacific/Galapagos"], "egypt": ["Africa/Cairo"], "el salvador": ["America/El_Salvador"],
            "equatorial guinea": ["Africa/Malabo"], "eritrea": ["Africa/Asmara"], "estonia": ["Europe/Tallinn"],
            "eswatini": ["Africa/Mbabane"], "ethiopia": ["Africa/Addis_Ababa"], "fiji": ["Pacific/Fiji"], "finland": ["Europe/Helsinki"],
            "france": ["Europe/Paris"], "gabon": ["Africa/Libreville"], "gambia": ["Africa/Banjul"], "georgia": ["Asia/Tbilisi"],
            "germany": ["Europe/Berlin"], "ghana": ["Africa/Accra"], "greece": ["Europe/Athens"], "grenada": ["America/Grenada"],
            "guatemala": ["America/Guatemala"], "guinea": ["Africa/Conakry"], "guinea-bissau": ["Africa/Bissau"], "guyana": ["America/Guyana"],
            "haiti": ["America/Port-au-Prince"], "honduras": ["America/Tegucigalpa"], "hungary": ["Europe/Budapest"],
            "iceland": ["Atlantic/Reykjavik"], "india": ["Asia/Kolkata"], "indonesia": ["Asia/Jakarta", "Asia/Makassar", "Asia/Jayapura", "Asia/Pontianak"],
            "iran": ["Asia/Tehran"], "iraq": ["Asia/Baghdad"], "ireland": ["Europe/Dublin"], "israel": ["Asia/Jerusalem"],
            "italy": ["Europe/Rome"], "jamaica": ["America/Jamaica"], "japan": ["Asia/Tokyo"], "jordan": ["Asia/Amman"],
            "kazakhstan": ["Asia/Almaty", "Asia/Oral"], "kenya": ["Africa/Nairobi"], "kiribati": ["Pacific/Tarawa", "Pacific/Kiritimati"],
            "korea": ["Asia/Seoul"], "south korea": ["Asia/Seoul"], "north korea": ["Asia/Pyongyang"],
            "kuwait": ["Asia/Kuwait"], "kyrgyzstan": ["Asia/Bishkek"], "laos": ["Asia/Vientiane"], "latvia": ["Europe/Riga"],
            "lebanon": ["Asia/Beirut"], "lesotho": ["Africa/Maseru"], "liberia": ["Africa/Monrovia"], "libya": ["Africa/Tripoli"],
            "liechtenstein": ["Europe/Vaduz"], "lithuania": ["Europe/Vilnius"], "luxembourg": ["Europe/Luxembourg"],
            "madagascar": ["Indian/Antananarivo"], "malawi": ["Africa/Blantyre"], "malaysia": ["Asia/Kuala_Lumpur"],
            "maldives": ["Indian/Maldives"], "mali": ["Africa/Bamako"], "malta": ["Europe/Malta"], "marshall islands": ["Pacific/Majuro"],
            "mauritania": ["Africa/Nouakchott"], "mauritius": ["Indian/Mauritius"], "mexico": ["America/Mexico_City", "America/Cancun", "America/Tijuana", "America/Hermosillo", "America/Mazatlan", "America/Chihuahua", "America/Monterrey"],
            "micronesia": ["Pacific/Pohnpei"], "moldova": ["Europe/Chisinau"], "monaco": ["Europe/Monaco"], "mongolia": ["Asia/Ulaanbaatar"],
            "montenegro": ["Europe/Podgorica"], "morocco": ["Africa/Casablanca"], "mozambique": ["Africa/Maputo"], "myanmar": ["Asia/Yangon"],
            "burma": ["Asia/Yangon"], "namibia": ["Africa/Windhoek"], "nauru": ["Pacific/Nauru"], "nepal": ["Asia/Kathmandu"],
            "netherlands": ["Europe/Amsterdam"], "new zealand": ["Pacific/Auckland", "Pacific/Chatham"], "nicaragua": ["America/Managua"],
            "niger": ["Africa/Niamey"], "nigeria": ["Africa/Lagos"], "north macedonia": ["Europe/Skopje"], "norway": ["Europe/Oslo"],
            "oman": ["Asia/Muscat"], "pakistan": ["Asia/Karachi"], "palau": ["Pacific/Palau"], "palestine": ["Asia/Gaza"],
            "panama": ["America/Panama"], "papua new guinea": ["Pacific/Port_Moresby"], "paraguay": ["America/Asuncion"],
            "peru": ["America/Lima"], "philippines": ["Asia/Manila"], "poland": ["Europe/Warsaw"], "portugal": ["Europe/Lisbon", "Atlantic/Azores", "Atlantic/Madeira"],
            "qatar": ["Asia/Qatar"], "romania": ["Europe/Bucharest"], 
            "russia": ["Europe/Moscow", "Asia/Yekaterinburg", "Asia/Novosibirsk", "Asia/Vladivostok", "Europe/Kaliningrad", "Europe/Samara", "Asia/Omsk", "Asia/Krasnoyarsk", "Asia/Irkutsk", "Asia/Yakutsk", "Asia/Magadan", "Asia/Kamchatka"],
            "rwanda": ["Africa/Kigali"], "saint kitts and nevis": ["America/St_Kitts"], "saint lucia": ["America/St_Lucia"],
            "saint vincent": ["America/St_Vincent"], "samoa": ["Pacific/Apia"], "san marino": ["Europe/San_Marino"],
            "sao tome and principe": ["Africa/Sao_Tome"], "saudi arabia": ["Asia/Riyadh"], "senegal": ["Africa/Dakar"],
            "serbia": ["Europe/Belgrade"], "seychelles": ["Indian/Mahe"], "sierra leone": ["Africa/Freetown"],
            "singapore": ["Asia/Singapore"], "slovakia": ["Europe/Bratislava"], "slovenia": ["Europe/Ljubljana"],
            "solomon islands": ["Pacific/Guadalcanal"], "somalia": ["Africa/Mogadishu"], "south africa": ["Africa/Johannesburg"],
            "spain": ["Europe/Madrid", "Atlantic/Canary"], "sri lanka": ["Asia/Colombo"], "sudan": ["Africa/Khartoum"], "suriname": ["America/Paramaribo"],
            "sweden": ["Europe/Stockholm"], "switzerland": ["Europe/Zurich"], "syria": ["Asia/Damascus"], "taiwan": ["Asia/Taipei"],
            "tajikistan": ["Asia/Dushanbe"], "tanzania": ["Africa/Dar_es_Salaam"], "thailand": ["Asia/Bangkok"], "togo": ["Africa/Lome"],
            "tonga": ["Pacific/Tongatapu"], "trinidad and tobago": ["America/Port_of_Spain"], "tunisia": ["Africa/Tunis"],
            "turkey": ["Europe/Istanbul"], "turkmenistan": ["Asia/Ashgabat"], "tuvalu": ["Pacific/Funafuti"], "uganda": ["Africa/Kampala"],
            "ukraine": ["Europe/Kiev"], "united arab emirates": ["Asia/Dubai"], "uae": ["Asia/Dubai"],
            "united kingdom": ["Europe/London"], "uk": ["Europe/London"], "great britain": ["Europe/London"],
            "united states": ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "America/Phoenix", "America/Anchorage", "America/Adak", "Pacific/Honolulu", "America/Detroit", "America/Boise", "America/Juneau"],
            "usa": ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "America/Phoenix", "America/Anchorage", "America/Adak", "Pacific/Honolulu", "America/Detroit", "America/Boise", "America/Juneau"],
            "us": ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "America/Phoenix", "America/Anchorage", "America/Adak", "Pacific/Honolulu", "America/Detroit", "America/Boise", "America/Juneau"],
            "uruguay": ["America/Montevideo"], "uzbekistan": ["Asia/Tashkent"], "vanuatu": ["Pacific/Efate"],
            "vatican": ["Europe/Vatican"], "venezuela": ["America/Caracas"], "vietnam": ["Asia/Ho_Chi_Minh"],
            "yemen": ["Asia/Aden"], "zambia": ["Africa/Lusaka"], "zimbabwe": ["Africa/Harare"]
        };

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('errorMessage');
        const resultWrapper = document.getElementById('resultWrapper');
        
        // Output elements
        const countryNameEl = document.getElementById('countryName');
        const primaryTimezoneEl = document.getElementById('primaryTimezone');
        const primaryTimeEl = document.getElementById('primaryTime');
        const primaryDateEl = document.getElementById('primaryDate');
        const subZonesContainer = document.getElementById('subZonesContainer');

        let currentInterval = null;
        let activeTimezones = [];
        let activeCountryName = "";

        // Listeners
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) return;

            // Hide old results
            resultWrapper.style.display = 'none';
            errorMessage.style.display = 'none';
            loader.style.display = 'block';

            if (currentInterval) {
                clearInterval(currentInterval);
            }

            setTimeout(() => {
                loader.style.display = 'none';
                
                if (countryTimezones[query]) {
                    activeTimezones = countryTimezones[query];
                    // Capitalize nicely
                    activeCountryName = query.replace(/\b\w/g, l => l.toUpperCase());
                    if(query === 'usa' || query === 'uae' || query === 'uk' || query === 'us') {
                        activeCountryName = query.toUpperCase();
                    }
                    
                    setupResultUI();
                    updateClocks();
                    currentInterval = setInterval(updateClocks, 1000);
                    resultWrapper.style.display = 'block';
                } else {
                    errorMessage.style.display = 'block';
                }
            }, 600); // Simulated delay for cyberpunk feel
        }

        function setupResultUI() {
            countryNameEl.textContent = activeCountryName;
            
            if (activeTimezones.length > 1) {
                subZonesContainer.style.display = 'flex';
                subZonesContainer.innerHTML = '';
                
                // Start from index 1 for subzones
                for(let i = 1; i < activeTimezones.length; i++) {
                    const zone = activeTimezones[i];
                    const div = document.createElement('div');
                    div.className = 'sub-zone-item';
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'sub-zone-name';
                    // Format zone name (America/New_York -> New York)
                    nameSpan.textContent = zone.split('/').pop().replace('_', ' ');
                    
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'sub-zone-time';
                    timeSpan.id = `subzone-${i}`;
                    
                    div.appendChild(nameSpan);
                    div.appendChild(timeSpan);
                    subZonesContainer.appendChild(div);
                }
            } else {
                subZonesContainer.style.display = 'none';
            }
        }

        function updateClocks() {
            const now = new Date();
            
            // Format Primary Zone (Index 0)
            const primaryTz = activeTimezones[0];
            const primaryData = getFormattedTime(now, primaryTz);
            
            primaryTimeEl.textContent = primaryData.time;
            primaryDateEl.textContent = primaryData.date;
            
            // Clean up tz string display (e.g. "EST - America/New_York")
            let friendlyZoneName = primaryTz.split('/').pop().replace('_', ' ');
            primaryTimezoneEl.textContent = `${primaryData.tzName} [${friendlyZoneName}]`;

            // Format Secondary Zones
            for(let i = 1; i < activeTimezones.length; i++) {
                const subTz = activeTimezones[i];
                const subData = getFormattedTime(now, subTz);
                const subEl = document.getElementById(`subzone-${i}`);
                if(subEl) {
                    subEl.textContent = `${subData.time} (${subData.tzName})`;
                }
            }
        }

        function getFormattedTime(dateObj, tz) {
            const timeOpts = { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const dateOpts = { timeZone: tz, weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' };
            const tzOpts = { timeZone: tz, timeZoneName: 'short' };

            const timeStr = new Intl.DateTimeFormat('en-US', timeOpts).format(dateObj);
            const dateStr = new Intl.DateTimeFormat('en-US', dateOpts).format(dateObj);
            
            let tzStr = "";
            try {
                const parts = new Intl.DateTimeFormat('en-US', tzOpts).formatToParts(dateObj);
                tzStr = parts.find(p => p.type === 'timeZoneName').value;
            } catch(e) {
                tzStr = tz; // Fallback
            }

            return { time: timeStr, date: dateStr, tzName: tzStr };
        }
    </script>
</body>
</html>
