        /* * ==========================================
         * CYBERPUNK STYLESHEET
         * ==========================================
         */
        :root {
            --bg-color: #020617;
            --cyan: #0ff;
            --pink: #f0f;
            --green: #0f0;
            --dark-panel: rgba(0, 20, 30, 0.7);
            --glass-border: rgba(0, 255, 255, 0.2);
            --glow-cyan: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3);
            --glow-pink: 0 0 10px rgba(255, 0, 255, 0.5), 0 0 20px rgba(255, 0, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                linear-gradient(rgba(0, 5, 15, 0.95), rgba(0, 5, 15, 0.95)),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 255, 0.03) 2px, rgba(0, 255, 255, 0.03) 4px);
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-top: 5vh;
            margin-bottom: 30px;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            color: var(--cyan);
            text-shadow: var(--glow-cyan), 0 0 40px var(--cyan);
            margin-bottom: 5px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--green);
            font-size: 1.2rem;
            opacity: 0.9;
            text-shadow: 0 0 8px var(--green);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 700px;
        }

        .search-input {
            flex: 1;
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid var(--cyan);
            padding: 18px 25px;
            font-size: 1.3rem;
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1), 0 0 10px rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-transform: capitalize;
        }

        .search-input:focus {
            background: rgba(0, 40, 60, 0.9);
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.3), 0 0 30px rgba(0, 255, 255, 0.6);
            border-color: #fff;
        }

        .search-input::placeholder {
            color: rgba(0, 255, 255, 0.3);
            text-transform: none;
        }

        .search-btn {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 0 40px;
            font-size: 1.4rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.4), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .search-btn:hover::before {
            left: 150%;
        }

        .search-btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 30px var(--cyan);
            transform: scale(1.05);
        }

        .loader {
            display: none;
            color: var(--pink);
            font-size: 1.3rem;
            text-shadow: var(--glow-pink);
            margin-bottom: 20px;
            animation: pulse 1s infinite;
            letter-spacing: 3px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; text-shadow: 0 0 25px var(--pink); }
        }

        .error-message {
            display: none;
            color: #ff003c;
            text-shadow: 0 0 15px #ff003c;
            font-size: 1.5rem;
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            border: 1px solid #ff003c;
            padding: 20px 40px;
            background: rgba(255, 0, 60, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
            letter-spacing: 2px;
        }

        .result-wrapper {
            display: none;
            width: 90%;
            max-width: 700px;
            position: relative;
            padding: 2px;
            background: linear-gradient(45deg, var(--cyan), transparent, var(--pink), transparent, var(--cyan));
            background-size: 200% 200%;
            animation: gradientBorder 4s ease infinite;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            margin-bottom: 40px;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-card {
            background: var(--dark-panel);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            width: 100%;
            height: 100%;
            text-align: center;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        /* Scanline effect over the card */
        .result-card::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .country-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: var(--glow-pink), 0 0 30px var(--pink);
            font-weight: 900;
            letter-spacing: 3px;
        }

        .timezone-name {
            color: var(--cyan);
            font-size: 1.2rem;
            margin-bottom: 25px;
            opacity: 0.9;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .time-display {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 8vw, 5rem);
            color: #fff;
            text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan), 0 0 60px rgba(0, 255, 255, 0.6);
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        .date-display {
            font-size: 1.6rem;
            color: var(--green);
            text-shadow: 0 0 15px var(--green);
            margin-bottom: 35px;
        }

        .cities-header {
            text-align: left;
            color: var(--pink);
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--pink);
            padding-bottom: 5px;
            display: inline-block;
        }

        .sub-zones {
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            background: rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        .sub-zones::-webkit-scrollbar {
            width: 10px;
        }
        
        .sub-zones::-webkit-scrollbar-track {
            background: rgba(0, 20, 30, 0.8);
            border-left: 1px solid var(--glass-border);
        }
        
        .sub-zones::-webkit-scrollbar-thumb {
            background: var(--cyan);
            border-radius: 0;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        
        .sub-zones::-webkit-scrollbar-thumb:hover {
            background: var(--pink);
        }

        .sub-zone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 255, 255, 0.05);
            padding: 15px 25px;
            border-left: 4px solid var(--cyan);
            transition: all 0.2s ease;
        }

        .sub-zone-item.highlight {
            background: rgba(255, 0, 255, 0.2);
            border-left-color: var(--pink);
            box-shadow: inset 0 0 20px rgba(255, 0, 255, 0.2);
        }

        .sub-zone-item:hover {
            background: rgba(0, 255, 255, 0.15);
            border-left-color: var(--pink);
            transform: translateX(5px);
        }
        
        .sub-zone-name { 
            color: #fff; 
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: bold;
        }
        
        .sub-zone-time { 
            color: var(--cyan); 
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            font-size: 1.2rem;
            text-align: right;
            font-family: 'Orbitron', sans-serif;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: var(--cyan);
            opacity: 0.5;
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .search-container { flex-direction: column; }
            .search-btn { padding: 15px; }
            .sub-zone-item { flex-direction: column; align-items: flex-start; gap: 8px; }
            .sub-zone-time { text-align: left; color: var(--green); }
        }
    </style>
</head>

    </div>

            "netherlands": { capital: "Amsterdam", timezone: "Europe/Amsterdam", cities: { "Amsterdam": "Europe/Amsterdam", "Rotterdam": "Europe/Amsterdam", "The Hague": "Europe/Amsterdam", "Utrecht": "Europe/Amsterdam", "Eindhoven": "Europe/Amsterdam", "Tilburg": "Europe/Amsterdam", "Groningen": "Europe/Amsterdam", "Almere": "Europe/Amsterdam", "Breda": "Europe/Amsterdam", "Nijmegen": "Europe/Amsterdam", "Apeldoorn": "Europe/Amsterdam", "Haarlem": "Europe/Amsterdam", "Enschede": "Europe/Amsterdam", "Arnhem": "Europe/Amsterdam", "Amersfoort": "Europe/Amsterdam" } }
        };

        // Aliases mapping to main database keys for better search
        const aliases = {
            "usa": "united states",
            "us": "united states",
            "uk": "united kingdom",
            "great britain": "united kingdom",
            "england": "united kingdom",
            "uae": "united arab emirates",
            "vatican": "vatican city (holy see)",
            "czech republic": "czechia",
            "swaziland": "eswatini",
            "burma": "myanmar",
            "korea": "south korea",
            "bd": "bangladesh",
            "america": "united states",
            "brasil": "brazil"
        };

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('errorMessage');
        const resultWrapper = document.getElementById('resultWrapper');
        
        const countryNameEl = document.getElementById('countryName');
        const primaryTimezoneEl = document.getElementById('primaryTimezone');
        const primaryTimeEl = document.getElementById('primaryTime');
        const primaryDateEl = document.getElementById('primaryDate');
        const subZonesContainer = document.getElementById('subZonesContainer');

        let currentInterval = null;
        let activeCountryData = null;
        let highlightedCity = null;

        // Event Listeners
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // Search Logic: Resolves both country and city inputs
        function performSearch() {
            let query = searchInput.value.trim().toLowerCase();
            if (!query) return;

            // Resolve country aliases
            if (aliases[query]) {
                query = aliases[query];
            }

            // UI Reset
            resultWrapper.style.display = 'none';
            errorMessage.style.display = 'none';
            loader.style.display = 'block';
            highlightedCity = null;

            if (currentInterval) {
                clearInterval(currentInterval);
            }

            // Simulate Uplink Delay for Cyberpunk Feel
            setTimeout(() => {
                loader.style.display = 'none';
                
                let foundCountryKey = null;

                // 1. Direct Country Match
                if (worldDatabase[query]) {
                    foundCountryKey = query;
                } 
                // 2. City Match
                else {
                    for (const [countryKey, data] of Object.entries(worldDatabase)) {
                        const citiesLower = Object.keys(data.cities).map(c => c.toLowerCase());
                        if (citiesLower.includes(query)) {
                            foundCountryKey = countryKey;
                            // Re-capitalize city correctly for highlight
                            highlightedCity = Object.keys(data.cities).find(c => c.toLowerCase() === query);
                            break;
                        }
                    }
                }

                if (foundCountryKey) {
                    activeCountryData = worldDatabase[foundCountryKey];
                    
                    // Format Country Name nicely
                    let formattedName = foundCountryKey.replace(/\b\w/g, l => l.toUpperCase());
                    if(['united states', 'united kingdom', 'united arab emirates'].includes(foundCountryKey)) {
                        if (foundCountryKey === 'united states') formattedName = "USA";
                        if (foundCountryKey === 'united kingdom') formattedName = "UK";
                        if (foundCountryKey === 'united arab emirates') formattedName = "UAE";
                    }
                    
                    activeCountryData.displayName = formattedName;
                    
                    setupResultUI();
                    updateClocks();
                    currentInterval = setInterval(updateClocks, 1000);
                    resultWrapper.style.display = 'block';

                    // Scroll to city if a city was searched
                    if (highlightedCity) {
                        setTimeout(() => {
                            const cityRow = document.getElementById(`row-${highlightedCity.replace(/\s+/g, '-')}`);
                            if (cityRow) {
                                cityRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }, 100);
                    }

                } else {
                    errorMessage.style.display = 'block';
                }
            }, 600); 
        }

        function getGmtOffsetString(date, tz) {
            try {
                const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'shortOffset' }).formatToParts(date);
                return parts.find(p => p.type === 'timeZoneName').value || 'GMT+0';
            } catch(e) {
                return 'GMT';
            }
        }

        function setupResultUI() {
            countryNameEl.textContent = activeCountryData.displayName;
            subZonesContainer.innerHTML = '';
            
            const citiesObj = activeCountryData.cities;
            const cityNames = Object.keys(citiesObj);

            // Populate the city list rows
            cityNames.forEach((cityName, index) => {
                const div = document.createElement('div');
                div.className = 'sub-zone-item';
                div.id = `row-${cityName.replace(/\s+/g, '-')}`;
                
                if(highlightedCity === cityName) {
                    div.classList.add('highlight');
                }
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'sub-zone-name';
                nameSpan.textContent = cityName;
                
                const timeSpan = document.createElement('span');
                timeSpan.className = 'sub-zone-time';
                timeSpan.id = `city-time-${index}`;
                
                div.appendChild(nameSpan);
                div.appendChild(timeSpan);
                subZonesContainer.appendChild(div);
            });
        }

        function updateClocks() {
            const now = new Date();
            
            // Capital Clock
            const capTz = activeCountryData.timezone;
            const capTimeOpts = { timeZone: capTz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const capDateOpts = { timeZone: capTz, weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' };
            
            const capTimeStr = new Intl.DateTimeFormat('en-US', capTimeOpts).format(now);
            const capDateStr = new Intl.DateTimeFormat('en-US', capDateOpts).format(now);
            const capOffsetStr = getGmtOffsetString(now, capTz);
            
            primaryTimeEl.textContent = capTimeStr;
            primaryDateEl.textContent = capDateStr;
            primaryTimezoneEl.textContent = `${capOffsetStr} (${activeCountryData.capital})`;

            // City Clocks Update Loop
            const citiesObj = activeCountryData.cities;
            const cityNames = Object.keys(citiesObj);
            
            cityNames.forEach((cityName, index) => {
                const tz = citiesObj[cityName];
                const cityTimeOpts = { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                const timeStr = new Intl.DateTimeFormat('en-US', cityTimeOpts).format(now);
                const offsetStr = getGmtOffsetString(now, tz);
                
                const subEl = document.getElementById(`city-time-${index}`);
                if(subEl) {
                    subEl.textContent = `${timeStr} (${offsetStr})`;
                }
            });
        }
    </script>
</body>
</html>
