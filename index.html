<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --cyan: #0ff;
            --pink: #f0f;
            --green: #0f0;
            --dark-panel: rgba(0, 20, 30, 0.6);
            --glass-border: rgba(0, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                linear-gradient(rgba(2, 6, 23, 0.95), rgba(2, 6, 23, 0.95)),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 255, 0.03) 2px, rgba(0, 255, 255, 0.03) 4px);
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 25px;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--green);
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 5px var(--green);
            letter-spacing: 1px;
        }

        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 650px;
        }

        .search-input {
            flex: 1;
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid var(--cyan);
            padding: 15px 25px;
            font-size: 1.3rem;
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1), 0 0 10px rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-transform: capitalize;
        }

        .search-input:focus {
            background: rgba(0, 40, 60, 0.9);
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.3), 0 0 25px rgba(0, 255, 255, 0.5);
            border-color: #fff;
        }

        .search-input::placeholder {
            color: rgba(0, 255, 255, 0.3);
            text-transform: none;
        }

        .search-btn {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 0 35px;
            font-size: 1.3rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .search-btn:hover {
            background: var(--cyan);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--cyan);
            transform: scale(1.02);
        }

        .loader {
            display: none;
            color: var(--pink);
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--pink);
            margin-bottom: 20px;
            animation: pulse 1s infinite;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; text-shadow: 0 0 20px var(--pink); }
        }

        .error-message {
            display: none;
            color: #ff3333;
            text-shadow: 0 0 15px #ff0000;
            font-size: 1.5rem;
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            border: 1px solid #ff3333;
            padding: 15px 30px;
            background: rgba(255, 0, 0, 0.1);
        }

        .result-wrapper {
            display: none;
            width: 90%;
            max-width: 650px;
            position: relative;
            padding: 2px;
            background: linear-gradient(45deg, var(--cyan), transparent, var(--pink), transparent, var(--green));
            background-size: 200% 200%;
            animation: gradientBorder 4s ease infinite;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-card {
            background: var(--dark-panel);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px;
            width: 100%;
            height: 100%;
            text-align: center;
            border-radius: 2px;
            position: relative;
        }

        .country-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .timezone-name {
            color: var(--cyan);
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.9;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .time-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.5rem;
            color: #fff;
            text-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan), 0 0 45px rgba(0, 255, 255, 0.5);
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .date-display {
            font-size: 1.5rem;
            color: var(--green);
            text-shadow: 0 0 10px var(--green);
            margin-bottom: 30px;
        }

        .cities-header {
            text-align: left;
            color: var(--pink);
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sub-zones {
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding: 15px 5px 15px 0;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
        }

        .sub-zones::-webkit-scrollbar {
            width: 8px;
        }
        
        .sub-zones::-webkit-scrollbar-track {
            background: rgba(0, 20, 30, 0.5);
            border-left: 1px solid var(--glass-border);
        }
        
        .sub-zones::-webkit-scrollbar-thumb {
            background: var(--cyan);
            border-radius: 0;
            box-shadow: 0 0 10px var(--cyan);
        }

        .sub-zone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 255, 255, 0.03);
            padding: 12px 20px;
            border-left: 3px solid var(--cyan);
            transition: all 0.2s ease;
        }

        .sub-zone-item:hover {
            background: rgba(0, 255, 255, 0.1);
            border-left-color: var(--pink);
            transform: translateX(5px);
        }
        
        .sub-zone-name { 
            color: #fff; 
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        .sub-zone-time { 
            color: var(--cyan); 
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
            font-size: 1.1rem;
            text-align: right;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: var(--cyan);
            opacity: 0.6;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .search-container { flex-direction: column; }
            .search-btn { padding: 15px; }
            .time-display { font-size: 3rem; }
            .country-name { font-size: 2rem; }
            .sub-zone-item { flex-direction: column; align-items: flex-start; gap: 5px; }
            .sub-zone-time { text-align: left; color: var(--green); }
        }
    </style>
</head>
<body>

        <div class="subtitle">Search any country to view all city times</div>
    </header>

            <div class="cities-header">Cities:</div>
            <div id="subZonesContainer" class="sub-zones">

            </div>
        </div>
    </div>

            "us": "united states",
            "uk": "united kingdom",
            "great britain": "united kingdom",
            "uae": "united arab emirates",
            "vatican": "vatican city (holy see)",
            "vatican city": "vatican city (holy see)",
            "czech republic": "czechia",
            "swaziland": "eswatini",
            "congo": "congo (congo-brazzaville)",
            "burma": "myanmar (burma)",
            "myanmar": "myanmar (burma)",
            "korea": "south korea"
        };

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('errorMessage');
        const resultWrapper = document.getElementById('resultWrapper');
        
        // Output elements
        const countryNameEl = document.getElementById('countryName');
        const primaryTimezoneEl = document.getElementById('primaryTimezone');
        const primaryTimeEl = document.getElementById('primaryTime');
        const primaryDateEl = document.getElementById('primaryDate');
        const subZonesContainer = document.getElementById('subZonesContainer');

        let currentInterval = null;
        let activeCountryData = null;

        // Listeners
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        function performSearch() {
            let query = searchInput.value.trim().toLowerCase();
            if (!query) return;

            // Resolve alias
            if (aliases[query]) {
                query = aliases[query];
            }

            // Hide old results
            resultWrapper.style.display = 'none';
            errorMessage.style.display = 'none';
            loader.style.display = 'block';

            if (currentInterval) {
                clearInterval(currentInterval);
            }

            setTimeout(() => {
                loader.style.display = 'none';
                
                if (worldDatabase[query]) {
                    activeCountryData = worldDatabase[query];
                    
                    // Format Country Name (Special case abbreviations)
                    let formattedName = query.replace(/\b\w/g, l => l.toUpperCase());
                    if(['united states', 'united kingdom', 'united arab emirates'].includes(query)) {
                        formattedName = query.split(' ').map(w => w[0].toUpperCase()).join('');
                        if (query === 'united states') formattedName = "USA";
                        if (query === 'united kingdom') formattedName = "UK";
                        if (query === 'united arab emirates') formattedName = "UAE";
                    }
                    if (query === "vatican city (holy see)") formattedName = "Vatican City";
                    if (query === "congo (congo-brazzaville)") formattedName = "Congo";
                    if (query === "myanmar (burma)") formattedName = "Myanmar";
                    
                    activeCountryData.displayName = formattedName;
                    
                    setupResultUI();
                    updateClocks();
                    currentInterval = setInterval(updateClocks, 1000);
                    resultWrapper.style.display = 'block';
                } else {
                    errorMessage.style.display = 'block';
                }
            }, 500); // UI visual delay
        }

        function getGmtOffsetString(date, tz) {
            try {
                // Gets short offset like GMT+6, GMT-4, etc.
                const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'shortOffset' }).formatToParts(date);
                return parts.find(p => p.type === 'timeZoneName').value;
            } catch(e) {
                return tz;
            }
        }

        function setupResultUI() {
            countryNameEl.textContent = activeCountryData.displayName;
            subZonesContainer.innerHTML = '';
            
            const cities = activeCountryData.cities;
            const cityNames = Object.keys(cities);

            // Populate the scrollable list of cities
            cityNames.forEach((cityName, index) => {
                const tz = cities[cityName];
                const div = document.createElement('div');
                div.className = 'sub-zone-item';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'sub-zone-name';
                nameSpan.textContent = cityName;
                
                const timeSpan = document.createElement('span');
                timeSpan.className = 'sub-zone-time';
                timeSpan.id = `city-time-${index}`;
                
                div.appendChild(nameSpan);
                div.appendChild(timeSpan);
                subZonesContainer.appendChild(div);
            });
        }

        function updateClocks() {
            const now = new Date();
            
            // Format Capital Zone
            const capTz = activeCountryData.timezone;
            const capTimeOpts = { timeZone: capTz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const capDateOpts = { timeZone: capTz, weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' };
            
            const capTimeStr = new Intl.DateTimeFormat('en-US', capTimeOpts).format(now);
            const capDateStr = new Intl.DateTimeFormat('en-US', capDateOpts).format(now);
            const capOffsetStr = getGmtOffsetString(now, capTz);
            
            primaryTimeEl.textContent = capTimeStr;
            primaryDateEl.textContent = capDateStr;
            primaryTimezoneEl.textContent = `${capOffsetStr} (${activeCountryData.capital})`;

            // Format City Zones
            const cities = activeCountryData.cities;
            const cityNames = Object.keys(cities);
            
            cityNames.forEach((cityName, index) => {
                const tz = cities[cityName];
                const cityTimeOpts = { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                const timeStr = new Intl.DateTimeFormat('en-US', cityTimeOpts).format(now);
                const offsetStr = getGmtOffsetString(now, tz);
                
                const subEl = document.getElementById(`city-time-${index}`);
                if(subEl) {
                    subEl.textContent = `${timeStr} (${offsetStr})`;
                }
            });
        }
    </script>
</body>
</html>
